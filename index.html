<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ivideon</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="vms-container">
    <header class="vms-header">
      <h1>Ivideon <span id="layout-mode" class="layout-mode" data-mode>Live</span></h1>
    </header>

    <div class="cells-grid">
      <div class="cell" data-cell-id="1">
        <div class="cell-video-placeholder">
          <span class="cell-placeholder-icon">📹</span>
        </div>
        <div class="cell-info">
          <span class="cell-name">Камера 1 — Парковка</span>
          <div class="cell-info-right">
            <button type="button" class="cell-go-archive" data-cell-id="1">Go Archive</button>
            <button type="button" class="cell-go-live" data-cell-id="1">Go Live</button>
            <span class="cell-status" data-status>Live</span>
          </div>
        </div>
      </div>

      <div class="cell" data-cell-id="2">
        <div class="cell-video-placeholder">
          <span class="cell-placeholder-icon">📹</span>
        </div>
        <div class="cell-info">
          <span class="cell-name">Камера 2 — Вход</span>
          <div class="cell-info-right">
            <button type="button" class="cell-go-archive" data-cell-id="2">Go Archive</button>
            <button type="button" class="cell-go-live" data-cell-id="2">Go Live</button>
            <span class="cell-status" data-status>Live</span>
          </div>
        </div>
      </div>

      <div class="cell" data-cell-id="3">
        <div class="cell-video-placeholder">
          <span class="cell-placeholder-icon">📹</span>
        </div>
        <div class="cell-info">
          <span class="cell-name">Камера 3 — Коридор</span>
          <div class="cell-info-right">
            <button type="button" class="cell-go-archive" data-cell-id="3">Go Archive</button>
            <button type="button" class="cell-go-live" data-cell-id="3">Go Live</button>
            <span class="cell-status" data-status>Live</span>
          </div>
        </div>
      </div>

      <div class="cell" data-cell-id="4">
        <div class="cell-video-placeholder">
          <span class="cell-placeholder-icon">📹</span>
        </div>
        <div class="cell-info">
          <span class="cell-name">Камера 4 — Склад</span>
          <div class="cell-info-right">
            <button type="button" class="cell-go-archive" data-cell-id="4">Go Archive</button>
            <button type="button" class="cell-go-live" data-cell-id="4">Go Live</button>
            <span class="cell-status" data-status>Live</span>
          </div>
        </div>
      </div>
    </div>

    <div class="timeline-section">
      <div class="timeline-header">
        <button type="button" class="timeline-collapse-btn" id="timeline-collapse-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="timeline-collapse-label">Свернуть таймлайн</span>
        </button>
      </div>
      <div class="timeline-body" id="timeline-body">
        <div class="timeline" id="timeline">
          <div class="timeline-ruler" id="timeline-ruler"></div>
          <div class="timeline-recordings" id="timeline-recordings"></div>
        </div>
        <div class="timeline-footer">
          <div class="layout-mode-toggle" id="layout-mode-toggle" role="switch" aria-checked="true">
            <span class="toggle-option" data-mode="live">Live</span>
            <span class="toggle-option" data-mode="archive">Archive</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
