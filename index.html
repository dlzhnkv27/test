<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ivideon</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="vms-container">
    <header class="vms-header">
      <h1>Ivideon <span id="layout-mode" class="layout-mode" data-mode>Live</span></h1>
    </header>

    <div class="cells-grid">
      <div class="cell" data-cell-id="1">
        <div class="cell-video-placeholder">
          <span class="cell-placeholder-icon">📹</span>
        </div>
        <div class="cell-info">
          <span class="cell-name">Камера 1 — Парковка</span>
          <div class="cell-info-right">
            <button type="button" class="cell-go-archive" data-cell-id="1">Go Archive</button>
            <button type="button" class="cell-go-live" data-cell-id="1">Go Live</button>
            <span class="cell-status" data-status>Live</span>
          </div>
        </div>
      </div>

      <div class="cell" data-cell-id="2">
        <div class="cell-video-placeholder">
          <span class="cell-placeholder-icon">📹</span>
        </div>
        <div class="cell-info">
          <span class="cell-name">Камера 2 — Вход</span>
          <div class="cell-info-right">
            <button type="button" class="cell-go-archive" data-cell-id="2">Go Archive</button>
            <button type="button" class="cell-go-live" data-cell-id="2">Go Live</button>
            <span class="cell-status" data-status>Live</span>
          </div>
        </div>
      </div>

      <div class="cell" data-cell-id="3">
        <div class="cell-video-placeholder">
          <span class="cell-placeholder-icon">📹</span>
        </div>
        <div class="cell-info">
          <span class="cell-name">Камера 3 — Коридор</span>
          <div class="cell-info-right">
            <button type="button" class="cell-go-archive" data-cell-id="3">Go Archive</button>
            <button type="button" class="cell-go-live" data-cell-id="3">Go Live</button>
            <span class="cell-status" data-status>Live</span>
          </div>
        </div>
      </div>

      <div class="cell" data-cell-id="4">
        <div class="cell-video-placeholder">
          <span class="cell-placeholder-icon">📹</span>
        </div>
        <div class="cell-info">
          <span class="cell-name">Камера 4 — Склад</span>
          <div class="cell-info-right">
            <button type="button" class="cell-go-archive" data-cell-id="4">Go Archive</button>
            <button type="button" class="cell-go-live" data-cell-id="4">Go Live</button>
            <span class="cell-status" data-status>Live</span>
          </div>
        </div>
      </div>
    </div>

    <div class="timeline-section">
      <div class="timeline-header">
        <button type="button" class="timeline-collapse-btn" id="timeline-collapse-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="timeline-collapse-label">Свернуть таймлайн</span>
        </button>
      </div>
      <div class="timeline-body" id="timeline-body">
        <div class="timeline" id="timeline">
          <div class="timeline-ruler" id="timeline-ruler"></div>
          <div class="timeline-recordings" id="timeline-recordings"></div>
        </div>
        <div class="timeline-footer">
          <div class="layout-mode-toggle" id="layout-mode-toggle" role="switch" aria-checked="true">
            <span class="toggle-option" data-mode="live">Live</span>
            <span class="toggle-option" data-mode="archive">Archive</span>
          </div>

          <div class="playback-controls" id="playback-controls">
            <div class="pb-live-controls">
              <button class="pb-pause-btn" id="pb-pause-live" type="button" data-tooltip="Пауза"></button>
              <span class="pb-time-text" id="pb-time-live">00:00:00</span>
              <span class="pb-live-pill">Live</span>
            </div>
            <div class="pb-archive-controls">
              <button class="pb-seek-btn" id="pb-seek-back" type="button" data-tooltip="−5 секунд">
                <span class="pb-seek-wrap">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 .49-3.62"/>
                  </svg>
                  <span class="pb-seek-num">5</span>
                </span>
              </button>
              <button class="pb-pause-btn" id="pb-pause-archive" type="button" data-tooltip="Пауза"></button>
              <div class="pb-time-block">
                <span class="pb-time-text" id="pb-time-archive">00:00:00</span>
                <span class="pb-date-text" id="pb-date-archive">00/00</span>
              </div>
              <button class="pb-seek-btn" id="pb-seek-fwd" type="button" data-tooltip="+5 секунд">
                <span class="pb-seek-wrap">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-.49-3.62"/>
                  </svg>
                  <span class="pb-seek-num">5</span>
                </span>
              </button>
              <button class="pb-speed-btn" id="pb-speed-btn" type="button" data-tooltip="Скорость воспроизведения">x1</button>
              <div class="pb-frame-controls">
                <button class="pb-frame-btn" id="pb-frame-back" type="button" data-tooltip="Предыдущий кадр">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <rect x="2" y="2" width="2.5" height="12" rx="1"/>
                    <polygon points="13,2 5.5,8 13,14"/>
                  </svg>
                </button>
                <button class="pb-frame-btn" id="pb-frame-fwd" type="button" data-tooltip="Следующий кадр">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <polygon points="3,2 10.5,8 3,14"/>
                    <rect x="11.5" y="2" width="2.5" height="12" rx="1"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
